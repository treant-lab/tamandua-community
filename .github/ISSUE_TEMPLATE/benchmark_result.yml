name: Benchmark Result
description: Submit a public-safe benchmark result or validation finding.
title: "[Benchmark]: "
labels: ["benchmark"]
body:
  - type: markdown
    attributes:
      value: "Do not include secrets, customer telemetry, live malware samples, or exploit payloads."
  - type: input
    id: profile
    attributes:
      label: Profile or scenario
      placeholder: windows-safe-contract-v1
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, agent commit, server commit, collector state
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected telemetry and detections
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed telemetry and detections
    validations:
      required: true
  - type: textarea
    id: gaps
    attributes:
      label: Misses, partial coverage, or false positives
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Sanitized artifacts or reproduction notes
