name: False Positive Report
description: Report a detection that fired on benign activity.
title: "[False positive]: "
labels: ["false-positive"]
body:
  - type: input
    id: rule
    attributes:
      label: Rule or alert name
    validations:
      required: true
  - type: textarea
    id: benign
    attributes:
      label: Why this is benign
    validations:
      required: true
  - type: textarea
    id: event
    attributes:
      label: Sanitized event details
      description: Remove hostnames, usernames, secrets, customer data, and private paths when needed.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Suggested suppression scope
      placeholder: command, signer, parent process, path, environment, user role
